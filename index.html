<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIA KURTANIDZE</title>
    <style>
        :root {
            --bg: #F0F0F0; /* Raw concrete/paper grey */
            --ink: #000000;
            --mucho-red: #ff3300; /* Mucho's specific neon-red */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--ink); 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* MASSIVE TYPEFACE MASK */
        .hero {
            padding: 2vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h1 {
            font-size: 24vw;
            line-height: 0.75;
            letter-spacing: -0.08em;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* THE GRID (SYSTEMATIC & BRUTAL) */
        .dna-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            border-top: 2px solid var(--ink);
        }

        .dna-cell {
            grid-column: span 12;
            border-bottom: 2px solid var(--ink);
            padding: 4vw 2vw;
        }

        @media (min-width: 900px) {
            .dna-cell.large { grid-column: span 8; }
            .dna-cell.small { grid-column: span 4; border-left: 2px solid var(--ink); }
        }

        .label {
            font-size: 1vw;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--mucho-red);
            margin-bottom: 2vw;
            display: block;
        }

        h2 {
            font-size: 8vw;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .statement {
            font-size: 3.5vw;
            line-height: 1;
            font-weight: 500;
            text-transform: uppercase;
            max-width: 90%;
        }

        /* INTERACTIVE RED BLOCK */
        .contact-trigger {
            background: var(--mucho-red);
            color: var(--ink);
            padding: 4vw 2vw;
            text-decoration: none;
            display: block;
            font-size: 10vw;
            font-weight: 900;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .contact-trigger:hover {
            background: var(--ink);
            color: var(--mucho-red);
        }

        /* NAV STICKER */
        .nav-id {
            position: fixed;
            top: 2vw;
            right: 2vw;
            font-weight: 900;
            font-size: 12px;
            background: var(--ink);
            color: var(--bg);
            padding: 4px 8px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="nav-id">NK_2026_INDEX</div>

    <main>
        <section class="hero">
            <h1>NATIA<br>KURTA<br>NIDZE</h1>
            <div class="dna-grid">
                <div class="dna-cell">
                    <span class="label">Manifesto</span>
                    <p class="statement">Visual Designer. Branding. High-impact systems. Berlin based.</p>
                </div>
            </div>
        </section>

        <section class="dna-grid">
            <div class="dna-cell large">
                <span class="label">Experience_01</span>
                <h2>STK 118 GmbH</h2>
                <p>Lead visual identity. 2021—Now.</p>
            </div>
            <div class="dna-cell small">
                <span class="label">Edu</span>
                <h2>CS50x</h2>
                <p>Harvard Computer Science foundations.</p>
            </div>
        </section>

        <section class="dna-grid">
            <div class="dna-cell">
                <span class="label">The Toolkit</span>
                <h2 style="font-size: 12vw; word-break: break-all;">PS.AI.ID.AE.PY.JS.</h2>
            </div>
        </section>

        <a href="mailto:natia.kurtanidze55@gmail.com" class="contact-trigger">
            HIRE_ME_NOW
        </a>
    </main>

</body>
</html>
